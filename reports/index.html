<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partecipate Monitor</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 960px; margin: 0 auto; padding: 20px; color: #333; }
  h1 { color: #2c3e50; border-bottom: 2px solid #2980b9; padding-bottom: 8px; }
  h2 { color: #2c3e50; margin-top: 30px; font-size: 1.1em; }
  table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.9em; }
  th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
  th { background: #f5f5f5; font-weight: 600; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.85em; font-weight: bold; color: #fff; }
  .badge-alto { background: #27ae60; }
  .badge-medio { background: #f39c12; }
  .badge-basso { background: #e74c3c; }
  a { color: #2980b9; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .footer { margin-top: 40px; border-top: 1px solid #ddd; padding-top: 15px; font-size: 0.85em; color: #666; }
  .cards { display: flex; gap: 15px; flex-wrap: wrap; margin: 15px 0; }
  .card { flex: 1; min-width: 140px; padding: 12px; border-radius: 8px; text-align: center; background: #f8f9fa; }
  .card .val { font-size: 1.6em; font-weight: bold; }
  .card .lbl { font-size: 0.8em; color: #666; }
  .trend-up { color: #27ae60; }
  .trend-down { color: #e74c3c; }
</style>
</head>
<body>
<h1>Partecipate Monitor</h1>
<p id="meta">Caricamento...</p>

<div id="dashboard"></div>

<div class="footer">
  <p>Generato da <a href="https://github.com/dataciviclab/partecipate-monitor">partecipate-monitor</a>.</p>
</div>

<script>
fetch('data.json')
  .then(r => r.json())
  .then(d => {
    document.getElementById('meta').textContent =
      'Report generato il ' + (d.generato_il ? new Date(d.generato_il).toLocaleDateString('it') : '?');

    const out = document.getElementById('dashboard');
    out.innerHTML = '';

    // ── Profili intelligence ──
    if (d.profili && d.profili.length) {
      out.innerHTML += '<h2>Partecipate centrali — score intelligence</h2>';
      out.innerHTML += '<table><tr><th>Società</th><th class="num">Esposizione</th><th class="num">Performance</th><th class="num">Addetti</th><th class="num">Appalti</th><th class="num">Aiuti</th></tr>';

      d.profili.sort((a, b) => (b.score?.esposizione||0) - (a.score?.esposizione||0));
      for (const p of d.profili) {
        const sc = p.score || {};
        const occ = p.occupazione || {};
        const app = p.appalti || {};
        const aiu = p.aiuti_stato || {};

        const badge = (v) => `<span class="badge ${v >= 70 ? 'badge-alto' : v >= 40 ? 'badge-medio' : 'badge-basso'}">${v}</span>`;

        out.innerHTML += `<tr>
          <td><a href="#${p.cf}">${p.denominazione || p.cf}</a></td>
          <td class="num">${badge(sc.esposizione||0)}</td>
          <td class="num">${badge(sc.performance||0)}</td>
          <td class="num">${occ.addetti_per_anno ? Object.values(occ.addetti_per_anno).pop().toLocaleString() : '—'}</td>
          <td class="num">${app.importo_complessivo_totale ? '€' + (app.importo_complessivo_totale/1e9).toFixed(1) + ' Mld' : '—'}</td>
          <td class="num">${aiu.totale_esl ? '€' + (aiu.totale_esl/1e6).toFixed(0) + ' M' : '—'}</td>
        </tr>`;
      }
      out.innerHTML += '</table>';

      // ── Dettaglio per ogni partecipata ──
      for (const p of d.profili) {
        const att = p.assetto || {};
        const occ = p.occupazione || {};
        const gov = p.governance || {};
        const app = p.appalti || {};
        const aiu = p.aiuti_stato || {};
        const sc = p.score || {};

        out.innerHTML += `<h2 id="${p.cf}">${p.denominazione}</h2>
          <p>CF: ${p.cf} · Score esposizione: ${sc.esposizione||'—'} · Score performance: ${sc.performance||'—'}</p>`;

        if (att.denominazione) {
          out.innerHTML += '<table><tr><th colspan="2">Assetto</th></tr>';
          for (const [k, v] of Object.entries({Settore: att.settore, Addetti: att.addetti, 'Valore produzione': att.valore_produzione}))
            if (v) out.innerHTML += `<tr><td>${k}</td><td class="num">${typeof v === 'number' ? v.toLocaleString() : v}</td></tr>`;
          out.innerHTML += '</table>';
        }

        if (occ.addetti_per_anno) {
          out.innerHTML += '<table><tr><th colspan="3">Occupazione</th></tr>';
          out.innerHTML += Object.entries(occ.addetti_per_anno).map(([a, v]) =>
            `<tr><td>${a}</td><td class="num">${v.toLocaleString()}</td></tr>`
          ).join('');
          if (occ.trend_percentuale != null)
            out.innerHTML += `<tr><td><strong>Trend</strong></td><td class="num ${occ.trend_percentuale >= 0 ? 'trend-up' : 'trend-down'}"><strong>${occ.trend_percentuale > 0 ? '+' : ''}${occ.trend_percentuale}%</strong></td></tr>`;
          out.innerHTML += '</table>';
        }

        if (gov.compenso_totale) {
          out.innerHTML += '<table><tr><th colspan="2">Governance</th></tr>';
          out.innerHTML += `<tr><td>Compensi totali</td><td class="num">€${(gov.compenso_totale/1000).toFixed(0)}k</td></tr>`;
          if (gov.n_incarichi_remunerati) out.innerHTML += `<tr><td>Incarichi retribuiti</td><td class="num">${gov.n_incarichi_remunerati}</td></tr>`;
          out.innerHTML += '</table>';
        }

        if (app.totale_gare) {
          out.innerHTML += '<table><tr><th colspan="3">Appalti banditi</th></tr>';
          out.innerHTML += `<tr><td>Gare totali</td><td class="num">${app.totale_gare.toLocaleString()}</td></tr>`;
          out.innerHTML += `<tr><td>Importo complessivo</td><td class="num">€${(app.importo_complessivo_totale/1e9).toFixed(1)} Mld</td></tr>`;
          if (app.gare_per_anno) {
            out.innerHTML += '<tr><th>Anno</th><th class="num">Gare</th><th class="num">Importo</th></tr>';
            for (const g of app.gare_per_anno.slice(-5))
              out.innerHTML += `<tr><td>${g.anno}</td><td class="num">${g.n_gare.toLocaleString()}</td><td class="num">€${(g.importo_totale/1e6).toFixed(0)} M</td></tr>`;
          }
          out.innerHTML += '</table>';
        }

        if (aiu.totale_esl) {
          out.innerHTML += '<table><tr><th colspan="3">Aiuti di Stato</th></tr>';
          out.innerHTML += `<tr><td>Totale ESL</td><td class="num">€${(aiu.totale_esl/1e6).toFixed(0)} M</td></tr>`;
          out.innerHTML += `<tr><td>Aiuti distinti</td><td class="num">${aiu.n_aiuti_distinti}</td></tr>`;
          if (aiu.aiuti_per_anno) {
            out.innerHTML += '<tr><th>Anno</th><th class="num">Aiuti</th><th class="num">ESL</th></tr>';
            for (const a of aiu.aiuti_per_anno)
              out.innerHTML += `<tr><td>${a.anno}</td><td class="num">${a.n_aiuti}</td><td class="num">€${(a.totale_esl/1e6).toFixed(1)} M</td></tr>`;
          }
          out.innerHTML += '</table>';
        }
      }
    }

    if (!d.profili || !d.profili.length) {
      out.innerHTML = '<p>Nessun profilo disponibile. Avvia la CI per generare il primo report.</p>';
    }
  })
  .catch(e => {
    document.getElementById('dashboard').innerHTML = `<p>Errore caricamento dati: ${e.message}</p>`;
  });
</script>
</body>
</html>
