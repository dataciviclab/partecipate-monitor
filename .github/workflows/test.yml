name: Test rapido
on:
  pull_request:
    paths:
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .
      - name: Test import moduli
        run: python -c "from fetch_data import fetch_mef,fetch_ipa,fetch_anac,fetch_rna,fetch_rappresentanti,fetch_all,estrai_partecipate,cf_targets_centrali; from build_fatti import step_mef,step_rappresentanti,step_anac,step_rna,unifica; from profiler import profila_cf,profila_lista; from report import main; print('OK')"
