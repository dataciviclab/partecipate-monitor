name: Test rapido
on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - name: Test schema validazione
        run: python -m pytest tests/ -v
      - name: Fast scan (30 siti)
        run: python src/scanner.py --solo-controllo --max=30
      - name: Catalogo (sui trovati)
        run: python src/catalogo.py
      - name: Formati
        run: python src/formati.py
      - name: Report
        run: python src/report.py
