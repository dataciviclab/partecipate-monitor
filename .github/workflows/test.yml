name: Test rapido
on:
  pull_request:
    paths:
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .
      - name: Fetch dati intelligence (Poste)
        run: python src/fetch_data.py --centrali
      - name: Build tabella fatti
        run: python src/build_fatti.py
      - name: Profilo Poste Italiane
        run: python src/profiler.py 97103880585
      - name: Report con profili
        run: python src/report.py --profili
