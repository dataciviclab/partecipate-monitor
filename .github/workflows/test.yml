name: Test rapido
on:
  pull_request:
    paths:
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .

      - name: Fetch + Build tabella fatti
        run: python src/fetch_data.py --centrali && python src/build_fatti.py

      - name: Gold set test
        run: python -m pytest tests/ -v
