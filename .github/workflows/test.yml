name: Test rapido
on:
  pull_request:
    paths:
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .
      - name: Smoke test profiler
        run: python -m src.profiler 00000000000

      - name: Verifica appalti_vinti in data.json
        run: python -c "import json,sys; d=json.load(open('reports/data.json')); p=d.get('profili',[]); assert p, 'nessun profilo'; assert any(x.get('appalti_vinti') for x in p), 'nessun appalti_vinti'; print(f'OK: {len(p)} profili, {sum(1 for x in p if x.get(\"appalti_vinti\"))} con vinti')"
