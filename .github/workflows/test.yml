name: Test rapido
on:
  pull_request:
    paths:
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .
      - name: Test import moduli
        run: python -c "from src.fetch_data import fetch_mef; from src.build_fatti import step_mef; from src.profiler import profila_cf; from src.report import main; print('OK')"
      - name: Smoke test profiler
        run: python -m src.profiler 00000000000
