name: Report intelligence
on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .

      - name: Fetch dati intelligence
        run: python src/fetch_data.py --centrali
      - name: Build tabella fatti
        run: python src/build_fatti.py
      - name: Genera report con profili
        run: python src/report.py --profili

      - name: Gold set test
        run: pip install pytest && python -m pytest tests/ -v

      - name: Commit risultati
        run: |
          git config user.name "partecipate-monitor[bot]"
          git config user.email "bot@dataciviclab.it"
          git add data/ reports/
          git diff --staged --quiet || git commit -m "scan: aggiornamento $(date +%Y-%m-%d)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  deploy:
    needs: intelligence
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
